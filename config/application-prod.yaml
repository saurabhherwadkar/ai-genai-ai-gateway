app:
  name: "ai-genai-ai-gateway"
routing:
  strategy: "priority"
  max_retries: 3
ratelimit:
  default_rpm: 60
  default_tpm: 500000
cache:
  ttl_seconds: 600
  max_entries: 10000
api:
  host: "0.0.0.0"
  port: 8000
  reload: false
logging:
  level: "INFO"
  format: "json"
  file: "logs/app-prod.log"
